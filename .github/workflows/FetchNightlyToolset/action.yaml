name: FetchNightlyToolset
description: Fetch nightly toolset generated by nightly-test.yml workflow
inputs:
  source-repo:
    description: "owner/repo to fetch the nightly toolset from (defaults to the current repository, override when running from a fork)."
    required: false
    default: ${{ github.repository }}
  github-token:
    description: "Token used to list runs and download the artifact. Needs actions:read on source-repo."
    required: false
    default: ${{ github.token }}
runs:
  using: "composite"
  steps:
    - name: Get latest run id of nightly-test.yml workflow
      id: latest
      uses: actions/github-script@v8
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const [owner, repo] = '${{ inputs.source-repo }}'.split('/');
          const workflowId = 'nightly-test.yml';
          const status = 'success';
          const resp = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: workflowId,
              status,
              per_page: 1, // we only need the latest
              page: 1
            });
          if (!resp.data.workflow_runs || resp.data.workflow_runs.length === 0) {
              core.setFailed(`No successful runs of "${workflowId}" found in ${owner}/${repo}.`);
              return;
            }
          const run = resp.data.workflow_runs[0];
          core.info(`Latest run id: ${run.id}, run_number: ${run.run_number}, conclusion: ${run.conclusion}`);
          core.setOutput('run_id', String(run.id));

    - name: Download toolset
      uses: actions/download-artifact@v4
      with:
        name: install-nightly-toolchain.tar.xz
        github-token: ${{ inputs.github-token }}
        repository: ${{ inputs.source-repo }}
        run-id: ${{ steps.latest.outputs.run_id }}

    - name: Extract toolset
      shell: bash
      run: |
        mkdir -p inst
        tar -xvf install-nightly-toolchain.tar.xz -C inst --strip-components=1
        ls inst
        echo "PATH=$(pwd)/inst/bin:$PATH" >> $GITHUB_ENV
