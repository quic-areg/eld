name: Zephyr Nightly with ELD

on:
  # pull_request: {} # Uncomment only to test this WF file update.
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write
jobs:
  zephyr-build-and-test:
    if: github.repository == 'qualcomm/eld' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/zephyrproject-rtos/ci-base:main
      options: --user 0
    strategy:
      fail-fast: false
      matrix:
        target:
          - board: qemu_riscv32
            arch: riscv32
          - board: qemu_riscv64
            arch: riscv64
          - board: qemu_cortex_m3
            arch: arm
          - board: qemu_cortex_a53
            arch: aarch64
    env:
      CPULLVM_DIR: /opt/cpullvm
      LLVM_TOOLCHAIN_PATH: /opt/cpullvm
      ZEPHYR_SDK_INSTALL_DIR: /opt/toolchains/
      CCACHE_DIR: /root/.ccache
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_NOHASHDIR: "1"
      CCACHE_MAXSIZE: "2G"
      CCACHE_COMPRESS: "1"
      # FIXME: ccache will be practically useless if the compiler changes with each run.
      CCACHE_COMPILERCHECK: "content"

    steps:
      - name: Checkout eld
        uses: actions/checkout@v6
        with:
          path: llvm-project/llvm/tools/eld

      - name: Prepare ccache dir
        run: |
          mkdir -p "$CCACHE_DIR"
          ccache --version | head -1

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ matrix.target.arch }}-cpullvm-nightly-${{ github.run_id }}
          restore-keys: |
            ccache-${{ matrix.target.arch }}-cpullvm-nightly-

      - name: ccache stats (before build)
        run: ccache -s -v || ccache -s

      - name: Record pre-build entry
        if: github.event_name == 'schedule'
        uses: ./llvm-project/llvm/tools/eld/.github/workflows/BuildStatusDataRecorder
        with:
          enabled: true
          project: "llvm-project/llvm/tools/eld"
          stage: "pre-"
          workflow-name: "zephyr"
          record-mode: "record"
          status: "fail"
          run-id: ${{github.run_id}}
          arch-name: ${{ matrix.target.arch }}
          branch-name: "main"

      - name: Fetch nightly ELD
        uses: ./llvm-project/llvm/tools/eld/.github/workflows/FetchNightlyToolset
        with:
          # Always pull from the canonical repo, including when this workflow
          # runs from a fork (forks don't have their own nightly-test.yml
          # runs). In qualcomm/eld the default GITHUB_TOKEN can read its own
          # actions; in a fork it can't, so we fall back to the PAT.
          source-repo: qualcomm/eld
          github-token: ${{ github.repository_owner == 'qualcomm' && github.token || secrets.CPULLVM_ARTIFACT_TOKEN }}

      - name: Fetch nightly cpullvm toolchain and splice nightly ELD
        # Picks the most recent qualcomm/cpullvm-toolchain artifact named
        # cpullvm-packages-build.sh-Linux-x86.  Requires a PAT in secret CPULLVM_ARTIFACT_TOKEN with
        # `actions:read` on qualcomm/cpullvm-toolchain; the default
        # GITHUB_TOKEN cannot read artifacts across repositories.
        env:
          GH_TOKEN: ${{ secrets.CPULLVM_ARTIFACT_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          import io, json, os, urllib.request, urllib.error, zipfile
          BASE = "https://api.github.com/repos/qualcomm/cpullvm-toolchain/actions"
          HDR = {"Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                 "Accept": "application/vnd.github+json"}
          def api_get(url):
              return urllib.request.urlopen(urllib.request.Request(url, headers=HDR)).read()
          meta = json.loads(api_get(f"{BASE}/artifacts?name=cpullvm-packages-build.sh-Linux-x86&per_page=1"))
          a = meta["artifacts"][0]
          print(f"Using cpullvm nightly run {a['workflow_run']['id']} @ {a['workflow_run']['head_sha']}")
          # The /zip endpoint 302s to a pre-signed Azure blob URL. Azure rejects
          # requests that carry our GitHub Bearer header alongside its own SAS
          # token, so suppress the redirect and fetch the blob URL with no
          # headers.
          class NoFollow(urllib.request.HTTPRedirectHandler):
              def redirect_request(self, *_, **__): return None
          opener = urllib.request.build_opener(NoFollow)
          try:
              opener.open(urllib.request.Request(f"{BASE}/artifacts/{a['id']}/zip", headers=HDR))
              raise RuntimeError("expected a 302 redirect to the blob URL")
          except urllib.error.HTTPError as e:
              if e.code not in (301, 302, 303, 307, 308):
                  raise
              blob_url = e.headers["Location"]
          with zipfile.ZipFile(io.BytesIO(urllib.request.urlopen(blob_url).read())) as z:
              z.extractall(".")
          PY
          tar -xf build/cpullvm-*-Linux-x86_64.tar.xz
          mv cpullvm-*-Linux-x86_64 "${CPULLVM_DIR}"
          rm -rf build

          # Splice nightly ELD into cpullvm
          cp inst/bin/ld.eld "${CPULLVM_DIR}/bin/ld.eld"
          cp inst/lib/libLW.so.4 "${CPULLVM_DIR}/lib/libLW.so.4"
          ln -sf libLW.so.4 "${CPULLVM_DIR}/lib/libLW.so"

          echo "Nightly ELD version:"
          "${CPULLVM_DIR}/bin/ld.eld" --version
          echo "cpullvm clang version:"
          "${CPULLVM_DIR}/bin/clang" --version | head -1

      - name: Clone Zephyr
        uses: actions/checkout@v6
        with:
          repository: zephyrproject-rtos/zephyr
          path: zephyr

      - name: Set safe.directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE/zephyr"

      - name: Download and apply ELD support patch
        run: |
          cd zephyr
          wget -q --tries=3 --retry-on-http-error=429,500,502,503,504 --waitretry=5 https://github.com/zephyrproject-rtos/zephyr/pull/103778.patch -O eld-support.patch
          git apply eld-support.patch

      - name: Download and apply ULEB128 fix for kobject list
        run: |
          cd zephyr
          wget -q --tries=3 --retry-on-http-error=429,500,502,503,504 --waitretry=5 https://github.com/quic-areg/zephyr/commit/17f605dd6a9fed6bb93e148a822f9bf7e0dae8f0.patch -O uleb128-fix.patch
          git apply uleb128-fix.patch

      - name: West setup
        run: |
          cd zephyr
          west init -l .
          west update

      - name: Install Zephyr SDK hosttools
        run: |
          west sdk install --no-gnu-toolchains --install-base /opt/toolchains

      - name: Build hello_world for ${{ matrix.target.board }} with ELD
        shell: bash
        run: |
          cd zephyr
          source zephyr-env.sh
          export ZEPHYR_TOOLCHAIN_VARIANT=host/llvm
          west build -p always -b ${{ matrix.target.board }} samples/hello_world -- \
            -DCONFIG_LLVM_USE_ELD=y \
            -DCONFIG_COMPILER_RT_RTLIB=y \
            -DCONFIG_PICOLIBC_USE_TOOLCHAIN=y

      - name: Run hello_world on QEMU
        shell: bash
        run: |
          cd zephyr
          source zephyr-env.sh
          set -o pipefail
          timeout -k 1s 5s west build -t run 2>&1 | tee run_output.log || true
          if grep -q "Hello World" run_output.log; then
            echo "hello_world executed successfully"
          else
            echo "hello_world did not produce expected output"
            exit 1
          fi

      - name: Run twister tests for ${{ matrix.target.board }} with ELD
        shell: bash
        run: |
          cd zephyr
          source zephyr-env.sh
          west twister -W -p ${{ matrix.target.board }} \
            --inline-logs \
            --timestamps \
            -j 3 \
            -v \
            -x=ZEPHYR_TOOLCHAIN_VARIANT=host/llvm \
            -x=CONFIG_LLVM_USE_ELD=y \
            -x=CONFIG_COMPILER_RT_RTLIB=y \
            -x=CONFIG_PICOLIBC_USE_TOOLCHAIN=y

      - name: Upload twister results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: zephyr-twister-results-${{ matrix.target.arch }}
          path: |
            zephyr/twister-out/twister.log
            zephyr/twister-out/twister.json

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: zephyr-build-artifacts-${{ matrix.target.arch }}
          path: |
            zephyr/build/zephyr/zephyr.elf
            zephyr/build/zephyr/zephyr.map

      - name: ccache stats (after build)
        if: always()
        run: ccache -s -v || ccache -s

      - name: Update build entry
        if: success() && github.event_name == 'schedule'
        uses: ./llvm-project/llvm/tools/eld/.github/workflows/BuildStatusDataRecorder
        with:
          enabled: true
          project: "llvm-project/llvm/tools/eld"
          stage: "post-"
          workflow-name: "zephyr"
          record-mode: "update"
          status: "pass"
          run-id: ${{github.run_id}}
          arch-name: ${{ matrix.target.arch }}
          branch-name: "main"
